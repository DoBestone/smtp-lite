name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux 服务器 ─────────────────────────────
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            label: x86_64
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            cross_cc: aarch64-linux-gnu-gcc
            cross_pkg: gcc-aarch64-linux-gnu
            label: ARM64 (Graviton/鲲鹏)
          - runner: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: "7"
            cross_cc: arm-linux-gnueabihf-gcc
            cross_pkg: gcc-arm-linux-gnueabihf
            label: ARMv7 (树莓派/边缘)
          - runner: ubuntu-latest
            goos: linux
            goarch: "386"
            cross_pkg: gcc-multilib
            label: x86 32-bit
          - runner: ubuntu-latest
            goos: linux
            goarch: mips64le
            cross_cc: mips64el-linux-gnuabi64-gcc
            cross_pkg: gcc-mips64el-linux-gnuabi64
            label: MIPS64LE (龙芯)
          - runner: ubuntu-latest
            goos: linux
            goarch: riscv64
            cross_cc: riscv64-linux-gnu-gcc
            cross_pkg: gcc-riscv64-linux-gnu
            label: RISC-V 64
          # ── macOS 开发 ──────────────────────────────
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            label: Apple Silicon
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            cross_cc: "clang -arch x86_64"
            label: Intel Mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install cross-compiler
        if: matrix.cross_pkg != '' && matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_pkg }}

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cross_cc || '' }}
        run: |
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then
            SUFFIX="${SUFFIX}v${{ matrix.goarm }}"
          fi
          BINARY_NAME="smtp-lite-${SUFFIX}"
          go build \
            -ldflags="-s -w" \
            -o "${BINARY_NAME}" \
            ./cmd/server/
          echo "BINARY_NAME=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Verify binary
        if: |
          (matrix.goos == 'linux' && (matrix.goarch == 'amd64' || matrix.goarch == '386')) ||
          matrix.goos == 'darwin'
        run: |
          ./${{ env.BINARY_NAME }} --version

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BINARY_NAME }}
          fail_on_unmatched_files: true
